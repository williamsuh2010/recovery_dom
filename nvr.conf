#!/bin/bash
# Recovery DOM Installation Configuration
# 이 파일을 수정하여 설치 옵션을 변경하세요.

# ── 디스크 설정 (10개 파티션) ──
EFI_SIZE="512M"         # x2 (EFI_A, EFI_B)
BOOT_SIZE="1G"          # x2 (boot_A, boot_B)
SWAP_SIZE="4G"
ROOT_SIZE="27.5G"       # x4 (root_A, root_B, root_C, root_D)

# ── 시스템 설정 ──
HOSTNAME="dnvr"
TIMEZONE="GMT-0"
ROOT_PASS="tgtwlwill135!"
USER_NAME="tgt"
USER_PASS="tgt7979"

# ── TTA 인증 설치 옵션 ──
# 1로 설정하면 로컬 가상 콘솔 전환(Ctrl+Alt+F2 등)과 터미널 실행 경로를 차단합니다.
# TTA_CERTIFICATION_DEBUG=1이면 검증기관 확인용 SSH는 유지합니다.
TTA_CERTIFICATION="0"
TTA_CERTIFICATION_DEBUG="0"

# ── Dashboard Server Node 설치 옵션 ──
# 1로 설정하면 이 Arch Linux 시스템이 NVR 내부 또는 단독 장비에서
# Dashboard Server Node를 실행할 수 있도록 Docker/Compose 기반 의존성을 설치합니다.
ENABLE_DASHBOARD_NODE="0"
DASHBOARD_NODE_DIR="/opt/nvr-dashboard"

# ── 네트워크 ──
DNS1="168.126.63.1"
DNS2="168.126.63.2"

# ── awesome snapshot (Arch archive date for stable awesome/lua53-lgi) ──
# Set to "" to use latest packages (awesome may break)
AWESOME_SNAPSHOT="2026/03/15"

# ── ecryptfs ──
ECRYPTFS_PASS="tgtwill135"
ECRYPTFS_SIG="6a380d1f8c168c15"

# ── Failover ──
FAILOVER_LOG="/var/log/failover.log"
RECOVERY_STATE_DIR="/var/lib/recovery"
HEALTH_CHECK_WAIT=600       # 10분 초기 대기
HEALTH_CHECK_PID_WAIT=600   # 10분 PID 생존 확인
SMART_CHECK_DISK="/dev/sda"
UPGRADE_SYNC_FLAG="/var/lib/recovery/upgrade_sync_d"

# ── rsync 제외 목록 ──
RSYNC_EXCLUDES=(
    /proc
    /sys
    /dev
    /tmp
    /run
    /mnt
    /root/tgtdnvr
)
